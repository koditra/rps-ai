<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Rock-Paper-Scissors-AI</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="stuffs">
            <img src="assets/rose.png" alt="Rose" class="rose">
            <h1>Rock Paper Scissors:</h1>
            <p>
                Choose Your Move and Battle the AI!
            </p>
            <h2>
                Make Your Move!
            </h2>
            <div class="buttons">
                <button id="rock">
                    <span class="emoji">
                        ✊
                    </span>
                    <span class="label">
                        Rock
                    </span>
                </button>
                <button id="paper">
                    <span class="emoji">
                        ✋
                    </span>
                    <span class="label">
                        Paper
                    </span>
                </button>
                <button id="scissors">
                    <span class="emoji">
                        ✌
                    </span>
                    <span class="label">
                        Scissors
                    </span>
                </button>
            </div>
            <div class="output">
                <h3 id="yourMove">
                    Your Move:
                </h3>
                <h3 id="aiChoice">
                    AI Move: 
                </h3>
                <h3 id="result">
                    Result: 
                </h3>
            </div>
        </div>
    </body>
</html>
